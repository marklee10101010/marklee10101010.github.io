<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>별빛 학습 퀘스트 3D</title>
<meta name="theme-color" content="#131c3a">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --night:#1E2A4A; --night2:#2B3A63; --gold:#FFD35C; --sky:#8ED4F5;
  --grass:#7CC15E; --card:#FFFFFF; --ink:#243044; --sub:#6B7A99;
  --ok:#39B26B; --bad:#E25555; --dia:#5AC8FA;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1630;
  font-family:'Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--ink);}
#c3d{position:fixed;inset:0;display:block;touch-action:none;}

/* ---------- HUD ---------- */
.hud{position:fixed;z-index:10;pointer-events:none;}
#hudTop{top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 12px;
  padding-top:calc(10px + env(safe-area-inset-top));}
.chip{background:rgba(30,42,74,.82);backdrop-filter:blur(6px);color:#fff;border-radius:16px;
  padding:8px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,.25);pointer-events:auto;}
.chip .lv{background:var(--gold);color:#5c4400;border-radius:10px;font-size:13px;padding:1px 8px;}
.xpbar{width:90px;height:8px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,#9be15d,#00e3ae);border-radius:99px;width:0%;transition:width .4s;}
.chip .num{font-size:16px;}
#hudTopRight{display:flex;gap:8px;}
/* 좁은 화면: 칩 축소 + 넘치면 오른쪽 그룹이 둘째 줄로 줄바꿈 (겹침/잘림 방지) */
@media (max-width:520px){
  #hudTop{padding:8px 8px;padding-top:calc(8px + env(safe-area-inset-top));
    flex-wrap:wrap;row-gap:6px;justify-content:flex-start;}
  .chip{padding:6px 9px;border-radius:13px;gap:5px;}
  .chip .num{font-size:14px;}
  .chip .lv{font-size:11px;padding:1px 6px;}
  .xpbar{width:52px;height:7px;}
  #hName{font-size:13px !important;}
  #hudTopRight{margin-left:auto;gap:5px;row-gap:5px;flex-wrap:wrap;justify-content:flex-end;}
}
/* 세로 모드: 레벨 게이지 숨겨 한 줄 유지 (가로 모드에선 표시) */
@media (orientation:portrait) and (max-width:520px){
  .xpbar{display:none;}
}
@media (max-width:380px){
  .chip{padding:5px 8px;}
}

#zoneBanner{position:fixed;top:calc(64px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-8px);
  background:rgba(30,42,74,.85);color:#fff;padding:8px 20px;border-radius:99px;font-size:16px;
  opacity:0;transition:all .4s;z-index:10;pointer-events:none;white-space:nowrap;}
#zoneBanner.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- 조이스틱 ---------- */
#joyZone{position:fixed;left:0;bottom:0;width:46%;height:52%;z-index:11;touch-action:none;}
#joyBase{position:fixed;left:26px;bottom:calc(30px + env(safe-area-inset-bottom));width:118px;height:118px;border-radius:50%;
  background:rgba(30,42,74,.65);border:3px solid rgba(255,255,255,.9);box-shadow:0 6px 18px rgba(0,0,0,.3);display:none;}
#joyBase::after{content:'';position:absolute;inset:16px;border-radius:50%;border:2px dashed rgba(255,255,255,.35);}
#joyKnob{position:fixed;width:58px;height:58px;border-radius:50%;display:none;
  background:linear-gradient(180deg,#ffffff,#dfe7f5);box-shadow:0 4px 12px rgba(0,0,0,.45);}

/* ---------- 말 걸기 버튼 (상단 중앙, 맥동) ---------- */
#talkBtn{position:fixed;left:50%;top:calc(74px + env(safe-area-inset-top));transform:translateX(-50%);z-index:12;
  background:var(--gold);color:#5c4400;border:none;border-radius:26px;padding:17px 26px;
  font-family:inherit;font-size:21px;box-shadow:0 6px 0 #d9a930,0 10px 26px rgba(0,0,0,.35);
  display:none;align-items:center;gap:10px;animation:btnPulse 1.1s infinite;}
#talkBtn:active{animation:none;transform:translateX(-50%) translateY(4px);box-shadow:0 2px 0 #d9a930;}
@keyframes btnPulse{
  0%,100%{transform:translateX(-50%) scale(1);box-shadow:0 6px 0 #d9a930,0 10px 26px rgba(0,0,0,.35),0 0 0 0 rgba(255,211,92,.75);}
  50%{transform:translateX(-50%) scale(1.07);box-shadow:0 6px 0 #d9a930,0 10px 26px rgba(0,0,0,.35),0 0 0 18px rgba(255,211,92,0);}
}
@keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}

/* ---------- 장면 전환 (원형 와이프) ---------- */
#transWipe{position:fixed;left:50%;top:45%;width:44px;height:44px;margin:-22px 0 0 -22px;border-radius:50%;
  z-index:45;pointer-events:none;transform:scale(0);opacity:0;}
#transWipe.run{animation:wipe .85s ease-in-out forwards;}
@keyframes wipe{
  0%{transform:scale(0);opacity:1;}
  42%{transform:scale(70);opacity:1;}
  58%{transform:scale(70);opacity:1;}
  100%{transform:scale(70);opacity:0;}
}

/* ---------- 시작 화면 ---------- */
#startScreen{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%, #33477e 0%, #131c3a 65%, #0b1226 100%);color:#fff;text-align:center;
  padding:calc(20px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));overflow-y:auto;}
#startScreen > *{flex-shrink:0;}
.tIn{background:rgba(255,255,255,.1);border:3px solid rgba(255,255,255,.3);border-radius:18px;
  padding:12px 18px;font-family:inherit;font-size:19px;color:#fff;text-align:center;width:min(280px,80vw);outline:none;}
.tIn:focus{border-color:var(--gold);}
.tIn::placeholder{color:#8fa3cf;font-size:16px;}
#fsStartBtn{position:fixed;top:calc(14px + env(safe-area-inset-top));right:16px;z-index:41;
  background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.35);color:#fff;border-radius:14px;
  width:46px;height:46px;font-size:20px;font-family:inherit;}
#startScreen h1{font-size:min(11vw,54px);letter-spacing:1px;text-shadow:0 4px 0 rgba(0,0,0,.3);}
#startScreen h1 b{color:var(--gold);}
#startScreen p{margin:14px 0 30px;color:#bcd0ff;font-size:16px;line-height:1.6;font-weight:normal;}
#startBtn{background:var(--gold);color:#5c4400;border:none;border-radius:26px;padding:16px 52px;
  font-family:inherit;font-size:22px;box-shadow:0 7px 0 #d9a930;}
#startBtn:active{transform:translateY(5px);box-shadow:0 2px 0 #d9a930;}
#nameInput{background:rgba(255,255,255,.1);border:3px solid rgba(255,255,255,.3);border-radius:18px;
  padding:12px 18px;font-family:inherit;font-size:20px;color:#fff;text-align:center;width:min(280px,80vw);outline:none;}
#nameInput:focus{border-color:var(--gold);}
#nameInput::placeholder{color:#8fa3cf;}
#charRow{display:flex;gap:10px;flex-wrap:nowrap;justify-content:flex-start;margin:14px 0 6px;
  max-width:min(92vw,620px);overflow-x:auto;scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding:6px 12px;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 24px,#000 calc(100% - 24px),transparent);
  mask-image:linear-gradient(90deg,transparent,#000 24px,#000 calc(100% - 24px),transparent);}
#charRow::-webkit-scrollbar{display:none;}
#charRow .charCard{flex-shrink:0;scroll-snap-align:center;}
.swipeHint{color:#8fa3cf;font-size:13px;font-weight:normal;margin-bottom:14px;}
.charCard{background:rgba(255,255,255,.08);border:3px solid rgba(255,255,255,.18);border-radius:18px;
  padding:6px 4px 8px;width:92px;cursor:pointer;transition:transform .15s;}
.charCard:active{transform:scale(.94);}
.charCard img{width:78px;height:90px;display:block;margin:0 auto;}
.charCard .cn{font-size:13px;color:#cfe0ff;margin-top:2px;font-weight:normal;}
.charCard.sel{border-color:var(--gold);background:rgba(255,211,92,.16);}
.charCard.sel .cn{color:var(--gold);}
#profRow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0 6px;max-width:600px;}
.profCard{position:relative;background:rgba(255,255,255,.08);border:3px solid rgba(255,255,255,.18);border-radius:16px;
  padding:8px 10px;min-width:92px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.profCard img{width:44px;height:52px;}
.profCard .pn{font-size:14px;color:#fff;max-width:86px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.profCard .pi{font-size:11px;color:#8fa3cf;font-weight:normal;}
.profCard.sel{border-color:var(--gold);background:rgba(255,211,92,.16);}
.profCard .px{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;
  background:#E25555;color:#fff;border:none;font-size:12px;font-family:inherit;line-height:1;}
.profCard.new{justify-content:center;color:#8fa3cf;font-size:26px;min-height:96px;}
.starsBg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.starsBg i{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:.7;animation:tw 2.4s infinite;}
@keyframes tw{50%{opacity:.15;}}

/* ---------- 퀴즈 모달 ---------- */
#quizOverlay{position:fixed;inset:0;z-index:30;background:rgba(13,22,48,.55);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;padding:16px;}
#quizCard{background:var(--card);border-radius:26px;width:min(560px,96vw);max-height:92vh;overflow-y:auto;
  padding:22px 22px 26px;box-shadow:0 24px 60px rgba(0,0,0,.4);animation:pop .3s;}
#quizHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
#quizWorldName{font-size:20px;display:flex;align-items:center;gap:8px;}
#quizWorldName .dot{width:14px;height:14px;border-radius:50%;}
#quizProg{color:var(--sub);font-size:15px;}
#quizLives{font-size:17px;letter-spacing:2px;}
#quizVisual{text-align:center;margin:10px 0;}
#quizPrompt{font-size:clamp(20px,5.4vw,28px);text-align:center;margin:14px 4px 20px;line-height:1.45;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.opt{background:#F2F5FB;border:3px solid #E2E8F4;border-radius:18px;padding:16px 10px;
  font-family:inherit;font-size:clamp(17px,4.6vw,22px);color:var(--ink);min-height:60px;}
.opt:active{background:#E7EDF9;}
.opt.correct{background:#E3F7EC;border-color:var(--ok);color:#1c7a47;}
.opt.wrong{background:#FDECEC;border-color:var(--bad);color:#a83030;animation:shake .35s;}
@keyframes shake{25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
#quizClose{background:none;border:none;font-size:22px;color:var(--sub);font-family:inherit;}

/* ---------- 결과 ---------- */
#resultBox{text-align:center;display:none;}
#resultBox .big{font-size:34px;margin:8px 0 4px;}
#resultBox .starRow{font-size:40px;letter-spacing:6px;margin:8px 0;}
#resultBox .earn{color:var(--sub);font-size:17px;margin-bottom:20px;}
.rBtn{background:var(--gold);color:#5c4400;border:none;border-radius:18px;padding:14px 34px;
  font-family:inherit;font-size:20px;box-shadow:0 5px 0 #d9a930;margin:0 6px;}
.rBtn.ghost{background:#EDF1F8;color:var(--sub);box-shadow:0 5px 0 #cfd7e6;}
.rBtn:active{transform:translateY(4px);box-shadow:0 1px 0 #d9a930;}

/* ---------- 토스트 ---------- */
#toast{position:fixed;left:50%;bottom:calc(120px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:rgba(30,42,74,.92);color:#fff;padding:10px 22px;border-radius:99px;font-size:16px;
  opacity:0;transition:all .35s;z-index:35;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.clockFace{width:180px;height:180px;}
.fracSvg{width:150px;height:150px;}

/* ---------- 로딩 화면 ---------- */
#loadScreen{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%, #33477e 0%, #131c3a 65%, #0b1226 100%);color:#fff;
  transition:opacity .5s;gap:22px;}
#loadScreen.done{opacity:0;pointer-events:none;}
.loadLogo{font-size:min(9vw,42px);text-shadow:0 4px 0 rgba(0,0,0,.3);animation:logoBob 1.6s ease-in-out infinite;}
.loadLogo b{color:var(--gold);}
@keyframes logoBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.loadBarWrap{width:min(260px,70vw);height:12px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;}
.loadBar{height:100%;width:40%;border-radius:99px;background:linear-gradient(90deg,var(--gold),#F2A93B);
  animation:loadSlide 1.1s ease-in-out infinite;}
@keyframes loadSlide{0%{margin-left:-40%;}100%{margin-left:100%;}}
.loadTip{color:#8fa3cf;font-size:15px;font-weight:normal;}

/* ---------- 레벨업 연출 ---------- */
#lvlOverlay{position:fixed;inset:0;z-index:46;display:none;align-items:center;justify-content:center;
  background:rgba(13,22,48,.45);pointer-events:none;}
#lvlCard{text-align:center;animation:lvlPop .5s cubic-bezier(.2,1.6,.4,1);}
#lvlCard .t1{font-size:20px;color:var(--gold);letter-spacing:6px;}
#lvlCard .t2{font-size:56px;color:#fff;text-shadow:0 5px 0 rgba(0,0,0,.35),0 0 30px rgba(255,211,92,.8);}
@keyframes lvlPop{0%{transform:scale(.3);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}

/* ---------- 출석 / 퀘스트 ---------- */
.attDots{display:flex;gap:8px;justify-content:center;margin:14px 0;}
.attDot{width:38px;height:38px;border-radius:50%;background:#EDF1F8;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--sub);border:2px solid #E2E8F4;}
.attDot.on{background:#FFF2CC;border-color:var(--gold);color:#b8860b;}
.attDot.today{background:var(--gold);color:#5c4400;transform:scale(1.15);box-shadow:0 3px 10px rgba(255,211,92,.5);}
.qBar{height:9px;background:#E2E8F4;border-radius:99px;overflow:hidden;margin-top:5px;}
.qBar i{display:block;height:100%;background:linear-gradient(90deg,#9be15d,#00e3ae);border-radius:99px;}

/* ---------- 콤보 / 파티클 / 다이아 비행 ---------- */
#comboBadge{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:#FF6B4A;color:#fff;border-radius:99px;padding:7px 20px;font-size:16px;
  box-shadow:0 4px 14px rgba(255,107,74,.55);display:none;
  animation:comboPop .35s cubic-bezier(.2,1.8,.4,1);white-space:nowrap;z-index:31;}
@keyframes comboPop{from{transform:translateX(-50%) scale(.4);}to{transform:translateX(-50%) scale(1);}}
.spark{position:fixed;z-index:48;pointer-events:none;font-size:18px;animation:sparkFly .7s ease-out forwards;}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(.3);opacity:0;}}
.flyDia{position:fixed;z-index:48;pointer-events:none;font-size:22px;transition:all .65s cubic-bezier(.3,.7,.4,1);}
.chipPulse{animation:chipP .35s;}
@keyframes chipP{50%{transform:scale(1.18);}}
.resStar{display:inline-block;animation:starIn .45s cubic-bezier(.2,1.8,.4,1) both;}
@keyframes starIn{from{transform:scale(0) rotate(-60deg);}to{transform:scale(1) rotate(0);}}

/* ---------- 저장 표시 / 토글 ---------- */
#savedTag{position:fixed;top:calc(52px + env(safe-area-inset-top));right:14px;z-index:9;
  background:rgba(30,42,74,.7);color:#9be15d;font-size:12px;padding:4px 12px;border-radius:99px;
  opacity:0;transition:opacity .4s;pointer-events:none;}
#savedTag.show{opacity:1;}
.tog{border:none;border-radius:99px;padding:8px 18px;font-family:inherit;font-size:15px;}
.tog.on{background:#E3F7EC;color:#1c7a47;}
.tog.off{background:#EDF1F8;color:var(--sub);}

/* ---------- 반응형: 세로 좁은 화면 ---------- */
@media (max-width:440px){
  .chip{padding:6px 10px;gap:6px;border-radius:13px;}
  .chip .num{font-size:14px;}
  .xpbar{width:60px;}
  #hName{max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #talkBtn{padding:14px 16px;font-size:17px;}
}
/* ---------- 반응형: 가로 낮은 화면 ---------- */
@media (max-height:520px){
  #quizCard{padding:14px 16px 16px;}
  #quizPrompt{margin:8px 4px 12px;font-size:clamp(17px,3.4vh,24px);}
  .clockFace{width:120px;height:120px;}
  .fracSvg{width:110px;height:110px;}
  .opt{padding:10px 8px;min-height:48px;font-size:clamp(15px,3vh,19px);}
  #joyBase{width:96px;height:96px;bottom:calc(18px + env(safe-area-inset-bottom));}
}
/* ---------- 반응형: 가로 모드 퀴즈 2열 배치 ---------- */
@media (orientation:landscape) and (max-height:560px){
  #quizCard{max-height:97vh;padding:10px 16px 12px;}
  #quizBody{display:grid;grid-template-columns:auto 1fr;column-gap:18px;align-items:center;
    grid-template-areas:"head head" "vis prompt" "vis opts";}
  #quizHead{grid-area:head;margin-bottom:4px;}
  #quizVisual{grid-area:vis;margin:0;display:flex;flex-direction:column;align-items:center;gap:4px;}
  #quizVisual:empty{display:none;}
  #quizPrompt{grid-area:prompt;margin:2px 4px 8px;}
  #quizOpts{grid-area:opts;}
  /* 행맨 축소 */
  #hgFig svg{width:92px !important;height:82px !important;}
  #hgSpeak{padding:7px 14px;font-size:14px;margin:2px 0;}
  .hgHint{font-size:13px;margin-top:0;}
  #hgBlanks{margin:0 0 2px;gap:6px;}
  .hgSlot{width:24px;height:30px;font-size:18px;border-bottom-width:3px;}
  #hgKeys{grid-template-columns:repeat(9,1fr);gap:4px;margin-top:2px;}
  .hgKey{padding:5px 0;font-size:13px;border-radius:8px;}
  /* 시계/분수 그림도 축소 */
  .clockFace{width:104px;height:104px;}
  .fracSvg{width:96px;height:96px;}
  .opt{padding:8px 8px;min-height:42px;font-size:clamp(14px,3vh,17px);}
  #resultBox .big{font-size:26px;}
  #resultBox .starRow{font-size:30px;margin:4px 0;}
}

/* ---------- 반응형: 시작 화면 낮은 높이 ---------- */
@media (max-height:640px){
  #startScreen{justify-content:flex-start;}
  #startScreen h1{font-size:min(6vw,30px) !important;}
  .charCard{width:76px;}
  .charCard img{width:62px;height:72px;}
  #charRow{margin:8px 0 4px;gap:8px;}
  #startBtn{padding:12px 40px;font-size:19px;}
}
/* ---------- 상점 ---------- */
.shopTab{flex:1;background:#EDF1F8;border:none;border-radius:14px;padding:10px;font-family:inherit;font-size:16px;color:var(--sub);}
/* ---------- 행맨 ---------- */
#hgBlanks{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:6px 0 4px;}
.hgSlot{width:34px;height:44px;border-bottom:4px solid var(--night);display:flex;align-items:center;justify-content:center;
  font-size:26px;color:var(--ink);}
.hgSlot.hit{animation:pop .25s;color:#1c7a47;}
#hgKeys{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:6px;}
.hgKey{background:#F2F5FB;border:2px solid #E2E8F4;border-radius:10px;padding:9px 0;
  font-family:inherit;font-size:17px;color:var(--ink);}
.hgKey:disabled{opacity:.9;}
.hgKey.hit{background:#E3F7EC;border-color:var(--ok);color:#1c7a47;}
.hgKey.miss{background:#FDECEC;border-color:var(--bad);color:#a83030;}
#hgSpeak{background:var(--night);color:#fff;border:none;border-radius:14px;padding:10px 18px;
  font-family:inherit;font-size:16px;margin:4px 0;}
#hgSpeak:active{transform:scale(.96);}
.hgHint{color:var(--sub);font-size:15px;font-weight:normal;margin-top:2px;}
@media (max-height:520px){
  .hgSlot{width:26px;height:34px;font-size:20px;border-bottom-width:3px;}
  .hgKey{padding:5px 0;font-size:14px;}
  #hgKeys{grid-template-columns:repeat(9,1fr);gap:4px;}
}
.shopTab.sel{background:var(--night);color:#fff;}

const VERSION='3.5.0';
const SAVE_VER=3;
const SAVE_KEY='starlight3d_mp';
const MAX_PROFILES=4;
function defaultProfile(){
  return { ver:SAVE_VER, diamonds:0, xp:0, level:1, stars:{}, pets:[], cosmetics:[],
           equipped:{}, lastLevel:{}, stats:{}, wrongs:[], name:'', charIdx:0,
           loginId:'', pass:'' };
}
function normalizeProfile(p){
  const d=defaultProfile();
  for(const k in d) if(p[k]===undefined) p[k]=d[k];
  if(!Array.isArray(p.pets)) p.pets=[];
  if(!Array.isArray(p.cosmetics)) p.cosmetics=[];
  if(!Array.isArray(p.wrongs)) p.wrongs=[];
  for(const k of ['stars','equipped','lastLevel','stats'])
    if(typeof p[k]!=='object'||p[k]===null||Array.isArray(p[k])) p[k]={};
  p.ver=SAVE_VER;
  return p;
}
let ROOT={ ver:SAVE_VER, active:0, profiles:[] };
try{ const raw=localStorage.getItem(SAVE_KEY); if(raw) ROOT=Object.assign(ROOT,JSON.parse(raw)); }catch(e){}
if(!Array.isArray(ROOT.profiles)) ROOT.profiles=[];

/* ============================================================
   간단 효과음 (WebAudio)
============================================================ */
let AC=null, sfxOn=true, bgmOn=true;
function initAudio(){
  if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(AC&&AC.state==='suspended') AC.resume();
  startBgm();
}
function rawTone(f,dur,type='square',vol=0.06,delay=0){
  if(!AC) return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.value=f; g.gain.value=vol;
  o.connect(g); g.connect(AC.destination);
  const t=AC.currentTime+delay;
  o.start(t); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.stop(t+dur+0.02);
}
/* BGM: 파일 없이 코드로 생성하는 잔잔한 펜타토닉 루프 */
let bgmTimer=null, bgmStep=0;
const BGM_SCALE=[392,440,523,587,659,784];
function startBgm(){
  if(!AC || bgmTimer || !bgmOn) return;
  let cur=2;
  bgmTimer=setInterval(()=>{
    if(!bgmOn || document.hidden) return;
    bgmStep++;
    /* 부드러운 멜로디: 근접 음으로 랜덤 이동 */
    cur=Math.max(0,Math.min(BGM_SCALE.length-1, cur+[-1,0,1,1,-1,2,-2][Math.floor(Math.random()*7)]));
    if(bgmStep%2===0) rawTone(BGM_SCALE[cur],.5,'sine',.016);
    if(bgmStep%8===0) rawTone(131,.9,'triangle',.02);
    if(bgmStep%8===4) rawTone(165,.9,'triangle',.016);
    if(bgmStep%16===0) rawTone(BGM_SCALE[cur]*2,.4,'sine',.008);
  },430);
}
function stopBgm(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }
function syncSound(){
  if(!ROOT.sound) ROOT.sound={bgm:true,sfx:true};
  bgmOn=ROOT.sound.bgm!==false;
  sfxOn=ROOT.sound.sfx!==false;
  if(!bgmOn) stopBgm(); else startBgm();
}
function tone(f,dur,type='square',vol=0.06,delay=0){
  if(!AC || !sfxOn) return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.value=f; g.gain.value=vol;
  o.connect(g); g.connect(AC.destination);
  const t=AC.currentTime+delay;
  o.start(t); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.stop(t+dur+0.02);
}

/* --- 섬: 평평한 잔디 상판 + 둥근 가장자리 + 곡면 흙 --- */
function makeIsland(radius, grassColor){
  const g=new THREE.Group();
  const V=(x,y)=>new THREE.Vector2(x,y);
  /* 1) 잔디 상판(평평한 원반): 걷는 면 전체를 확실히 덮음 (걷기 판정 반경 이상) */
  const topDisk=new THREE.Mesh(new THREE.CylinderGeometry(radius*1.02, radius*1.02, 0.5, 44), mat(grassColor));
  topDisk.position.y=-0.23; g.add(topDisk);
  /* 2) 잔디 가장자리: 상판 반경에서 살짝 부풀었다가 아래로 말림 */
  const grassPts=[
    V(radius*1.02, 0.02), V(radius*1.04, -0.2),
    V(radius*1.03, -0.5), V(radius*0.97, -1.0), V(radius*0.9, -1.45)
  ];
  const grass=new THREE.Mesh(new THREE.LatheGeometry(grassPts, 40), mat(grassColor));
  g.add(grass);
  /* 3) 흙: 가장자리 하단에서 부드러운 곡선으로 뾰족한 바닥까지 */
  const dirtPts=[
    V(radius*0.9, -1.45), V(radius*0.8, -1.6-radius*0.3),
    V(radius*0.5, -1.6-radius*0.64), V(radius*0.24, -1.6-radius*0.95),
    V(radius*0.06, -1.6-radius*1.16), V(0, -1.6-radius*1.2)
  ];
  const dirt=new THREE.Mesh(new THREE.LatheGeometry(dirtPts, 40), mat(0x8A6248));
  g.add(dirt);
  return g;
}
function makeTree(scale=1){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.2*scale,.3*scale,1.15*scale,10), mat(0x7a5236));
  trunk.position.y=.55*scale; g.add(trunk);
  if(Math.random()<0.42){
    /* 둥근 활엽수: 겹친 구 3개 */
    const c=0x5FB552;
    const s1=new THREE.Mesh(new THREE.SphereGeometry(1.15*scale,12,9), mat(c));
    s1.position.y=2.0*scale; s1.scale.y=.92; g.add(s1);
    const s2=new THREE.Mesh(new THREE.SphereGeometry(.8*scale,10,8), mat(0x6DC15E));
    s2.position.set(.55*scale,2.55*scale,.2*scale); g.add(s2);
    const s3=new THREE.Mesh(new THREE.SphereGeometry(.62*scale,10,8), mat(0x54A84B));
    s3.position.set(-.5*scale,2.5*scale,-.25*scale); g.add(s3);
  } else {
    /* 부드러운 소나무: 매끈한 원뿔 3단 */
    const c=0x4E9B44;
    for(let i=0;i<3;i++){
      const cone=new THREE.Mesh(new THREE.ConeGeometry((1.5-i*0.38)*scale,1.25*scale,12), mat(c));
      cone.position.y=(1.4+i*0.72)*scale; g.add(cone);
    }
  }
  return g;
}
function makeRock(scale=1){
  const r=new THREE.Mesh(new THREE.DodecahedronGeometry(.55*scale,0), fmat(0x9aa3ad));
  r.position.y=.3*scale; r.rotation.set(Math.random(),Math.random(),0); return r;
}
function rndOnIsland(cx,cz,r){
  const a=Math.random()*Math.PI*2, d=Math.sqrt(Math.random())*r;
  return [cx+Math.cos(a)*d, cz+Math.sin(a)*d];
}

    for(const [sx,sz] of [[-.2,.14],[.2,.14],[-.2,-.14],[.2,-.14]]){

      const inner=new THREE.Mesh(new THREE.CylinderGeometry(.03,.025,.34,6), mat(0xF2C4D0)); inner.position.set(sx*.12,1.12,.19); inner.rotation.z=sx*.12; g.add(inner);
    }
    const tail=new THREE.Mesh(new THREE.SphereGeometry(.12,8,7), mat(0xffffff)); tail.position.set(0,.42,-.3); g.add(tail);
  } else if(id==='dragon'){
    const c=0x57C87B;

let companion=null, compParts=null;
function setCompanion(){
  if(companion){ scene.remove(companion); companion=null; compParts=null; }
  const i=S.activePet;
  if(i==null || !S.pets || !S.pets[i]){ updatePetChip(); return; }
  const pet=S.pets[i], tp=petType(pet.type);
  const built = pet.hatched ? buildAnimal(pet.type) : buildEgg(tp.egg);
  companion=built.g; compParts=built;
  applyShadow(companion);
  companion.position.set(player.position.x+1.6, 0, player.position.z+1.2);
  scene.add(companion);
  updatePetChip();
}
function updatePetChip(){
  const el=document.getElementById('hPetIcon');
  if(!el) return;
  const i=S.activePet;
  if(i==null || !S.pets || !S.pets[i]){ el.innerHTML='&#128062;'; return; }
  const pet=S.pets[i];
  el.innerHTML = pet.hatched ? petType(pet.type).icon : '&#129370;';
}

function labelSprite(text, colorCss){
  const cv=document.createElement('canvas'); cv.width=512; cv.height=160;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='rgba(30,42,74,.85)'; roundRect(ctx,16,20,480,110,42); ctx.fill();
  ctx.fillStyle=colorCss; ctx.beginPath(); ctx.arc(76,75,22,0,7); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 56px sans-serif'; ctx.textBaseline='middle';
  ctx.fillText(text,120,80);
  const tex=new THREE.CanvasTexture(cv);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  sp.scale.set(6.4,2,1); return sp;
}
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

const ISLAND_GRASS={ dungeon:0x9a8fa3, village:0x8FCF6B, castle:0x86c968, clock:0xD9C08A,
  market:0xE8C9A0, calc:0x6b5f63, fraction:0x7CC98F, capital:0xC9B08A };
const animProps=[]; /* 매 프레임 애니메이션되는 소품 */
function emat(c,intensity){ return new THREE.MeshLambertMaterial({color:c, emissive:c, emissiveIntensity:intensity, flatShading:true}); }
function decorateIsland(w,cx,cz,ang){
  const add=(m,x,y,z)=>{ m.position.set(cx+x,y,cz+z); scene.add(m); return m; };
  const grp=(x,y,z)=>{ const g=new THREE.Group(); g.position.set(cx+x,y,cz+z); scene.add(g); return g; };
  switch(w.id){
  case 'dungeon':{ /* 돌기둥 + 횃불 */
    for(const [px,pz] of [[-3,2],[3,2],[-3,-3],[3,-3]]){
      add(new THREE.Mesh(new THREE.BoxGeometry(.9,2.6,.9), mat(0x6b6470)), px,1.3,pz);
      add(new THREE.Mesh(new THREE.BoxGeometry(1.2,.4,1.2), mat(0x555060)), px,2.8,pz);
      const flame=add(new THREE.Mesh(new THREE.ConeGeometry(.24,.6,6), emat(0xFF8A3C,.9)), px,3.3,pz);
      animProps.push({fn:t=>{ flame.scale.setScalar(.85+Math.sin(t*9+px)*0.2); }});
    }
    add(new THREE.Mesh(new THREE.BoxGeometry(2.2,2.4,.5), mat(0x555060)), 0,1.2,-4);
    add(new THREE.Mesh(new THREE.BoxGeometry(1.2,1.8,.6), mat(0x2c2733)), 0,.9,-3.9); /* 던전 입구 */
    break; }
  case 'village':{ /* 작은 집 두 채 + 울타리 */
    [[-3,-2,0xE8B598],[2.8,-3,0xA8C8E8]].forEach(([px,pz,col])=>{
      const h=grp(px,0,pz);
      const wall=new THREE.Mesh(new THREE.BoxGeometry(2,1.6,1.8), mat(col)); wall.position.y=.8; h.add(wall);
      const roof=new THREE.Mesh(new THREE.ConeGeometry(1.7,1.2,4), mat(0xC46A4A)); roof.position.y=2.2; roof.rotation.y=Math.PI/4; h.add(roof);
      const door=new THREE.Mesh(new THREE.BoxGeometry(.5,.8,.08), mat(0x6E4C36)); door.position.set(0,.4,.92); h.add(door);
      h.rotation.y=Math.atan2(cx-h.position.x, cz-h.position.z);
    });
    for(let k=0;k<6;k++){
      add(new THREE.Mesh(new THREE.BoxGeometry(.12,.7,.12), mat(0xC9924F)), -1+k*.7,.35,3.6);
    }
    add(new THREE.Mesh(new THREE.BoxGeometry(4.4,.1,.14), mat(0xC9924F)), .75,.6,3.6);
    break; }
  case 'castle':{ /* 성 (탑 2개 + 성벽 + 깃발) */
    [[-2.6,-2.6],[2.6,-2.6]].forEach(([px,pz])=>{
      add(new THREE.Mesh(new THREE.CylinderGeometry(1,1.1,3.4,8), mat(0xB8C4D8)), px,1.7,pz);
      add(new THREE.Mesh(new THREE.ConeGeometry(1.25,1.3,8), mat(0x5A8DEE)), px,3.9,pz);
    });
    add(new THREE.Mesh(new THREE.BoxGeometry(4.2,2,.9), mat(0xC8D2E4)), 0,1,-2.6);
    add(new THREE.Mesh(new THREE.BoxGeometry(1,1.4,.95), mat(0x3a4a6e)), 0,.7,-2.55);
    const pole=add(new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,1.6,5), mat(0x8a8f9c)), -2.6,5.2,-2.6);
    const flag=add(new THREE.Mesh(new THREE.BoxGeometry(.9,.5,.05), emat(0xFFD35C,.25)), -2.1,5.6,-2.6);
    animProps.push({fn:t=>{ flag.rotation.y=Math.sin(t*3)*0.25; }});
    break; }
  case 'clock':{ /* 시계탑 + 톱니 */
    const tw=grp(0,0,-3);
    const towerB=new THREE.Mesh(new THREE.BoxGeometry(1.8,4.2,1.8), mat(0xE8D8B8)); towerB.position.y=2.1; tw.add(towerB);
    const towerR=new THREE.Mesh(new THREE.ConeGeometry(1.5,1.2,4), mat(0xF2A93B)); towerR.position.y=4.9; towerR.rotation.y=Math.PI/4; tw.add(towerR);
    const face=new THREE.Mesh(new THREE.CylinderGeometry(.72,.72,.1,16), mat(0xffffff));
    face.rotation.x=Math.PI/2; face.position.set(0,3.3,.95); tw.add(face);
    const hh=new THREE.Mesh(new THREE.BoxGeometry(.08,.42,.04), mat(0x243044)); hh.position.set(0,3.42,1.02); tw.add(hh);
    const mh=new THREE.Mesh(new THREE.BoxGeometry(.06,.58,.04), mat(0xE25555)); mh.position.set(0,3.3,1.03); tw.add(mh);
    animProps.push({fn:t=>{ mh.rotation.z=-t*.5; hh.rotation.z=-t*.5/12; }});
    tw.rotation.y=ang+Math.PI; /* 시계면이 광장 쪽을 보게 */
    const gear=add(new THREE.Mesh(new THREE.TorusGeometry(.9,.28,6,8), mat(0xC9924F)), 3,.5,2);
    gear.rotation.x=Math.PI/2;
    animProps.push({fn:t=>{ gear.rotation.z=t*.6; }});
    break; }
  case 'market':{ /* 가판대 2개 + 상자 */
    [[-2.5,-2,0xE25555],[2.5,-2,0x5A8DEE]].forEach(([px,pz,col])=>{
      const st=grp(px,0,pz);
      for(const sx of [-1,1]){ const post=new THREE.Mesh(new THREE.BoxGeometry(.14,1.9,.14), mat(0xC9924F)); post.position.set(sx*1,.95,0); st.add(post); }
      const awn=new THREE.Mesh(new THREE.BoxGeometry(2.5,.14,1.6), mat(col)); awn.position.y=1.95; awn.rotation.x=.18; st.add(awn);
      const awn2=new THREE.Mesh(new THREE.BoxGeometry(2.5,.14,.5), mat(0xffffff)); awn2.position.set(0,1.86,.85); awn2.rotation.x=.18; st.add(awn2);
      const counter=new THREE.Mesh(new THREE.BoxGeometry(2.2,.7,.9), mat(0xD9B080)); counter.position.y=.35; st.add(counter);
      st.rotation.y=ang+Math.PI;
    });
    add(new THREE.Mesh(new THREE.BoxGeometry(.7,.7,.7), mat(0xB08050)), 0,.35,2.8);
    add(new THREE.Mesh(new THREE.BoxGeometry(.6,.6,.6), mat(0xC9924F)), .5,.3,3.5);
    break; }
  case 'calc':{ /* 화산 + 용암 */
    const vol=add(new THREE.Mesh(new THREE.ConeGeometry(3.4,4.2,9), mat(0x4a3f45)), 0,2.1,-2.5);
    const lava=add(new THREE.Mesh(new THREE.CylinderGeometry(1.15,1.3,.5,9), emat(0xFF5A2C,.95)), 0,4.05,-2.5);
    animProps.push({fn:t=>{ lava.material.emissiveIntensity=.7+Math.sin(t*4)*0.25; lava.position.y=4.05+Math.sin(t*4)*.05; }});
    for(const [px,pz] of [[2.8,1.5],[-2.8,1.2],[1,3.2]]){
      const rock=add(new THREE.Mesh(new THREE.DodecahedronGeometry(.42,0), emat(0xFF7A3C,.5)), px,.3,pz);
      animProps.push({fn:t=>{ rock.material.emissiveIntensity=.3+Math.sin(t*3+px)*0.2; }});
    }
    add(new THREE.Mesh(new THREE.DodecahedronGeometry(.8,0), mat(0x555060)), -2,.4,-.5);
    break; }
  case 'fraction':{ /* 호수 + 분수대 + 수련잎 */
    const pond=add(new THREE.Mesh(new THREE.CylinderGeometry(3.1,3.1,.15,18), emat(0x4FB8E8,.2)), 0,.08,-1.5);
    const base=add(new THREE.Mesh(new THREE.CylinderGeometry(.85,1.05,.55,9), mat(0xB8C4D8)), 0,.3,-1.5);
    const tier=add(new THREE.Mesh(new THREE.CylinderGeometry(.45,.55,.35,9), mat(0xC8D2E4)), 0,.75,-1.5);
    const jet=add(new THREE.Mesh(new THREE.ConeGeometry(.2,1.1,7), emat(0xBFE8FA,.6)), 0,1.5,-1.5);
    animProps.push({fn:t=>{ jet.scale.y=.8+Math.sin(t*5)*0.25; jet.position.y=1.35+jet.scale.y*.28; }});
    [[1.6,-1.9],[-1.5,-2.5],[.6,-4.3],[-.8,-4]].forEach(([px,pz],k)=>{
      const pad=add(new THREE.Mesh(new THREE.CylinderGeometry(.4,.4,.06,7), mat(0x57A05B)), px,.18,pz);
      animProps.push({fn:t=>{ pad.position.y=.18+Math.sin(t*1.8+k)*.03; }});
    });
    break; }
  case 'capital':{ /* 세계 탑 + 지구본 */
    const tw=grp(0,0,-2.5);
    [2.4,1.9,1.4].forEach((s,k)=>{
      const seg=new THREE.Mesh(new THREE.BoxGeometry(s,1.3,s), mat(k%2?0xD9C8A8:0xC9B08A)); seg.position.y=.65+k*1.3; tw.add(seg);
    });
    const globe=new THREE.Mesh(new THREE.SphereGeometry(.85,10,8), mat(0x4FA8E8)); globe.position.y=4.7; tw.add(globe);
    for(let k=0;k<5;k++){
      const land=new THREE.Mesh(new THREE.IcosahedronGeometry(.3,0), mat(0x57A05B));
      const a=k*1.9, b2=k*.9;
      land.position.set(Math.cos(a)*Math.sin(b2)*.82, Math.cos(b2)*.82, Math.sin(a)*Math.sin(b2)*.82);
      land.scale.set(1,1,.35); land.lookAt(0,0,0); globe.add(land);
    }
    animProps.push({fn:t=>{ globe.rotation.y=t*.4; }});
    for(const [px,pz,col] of [[-3,1.5,0xE25555],[3,1.5,0x5A8DEE],[0,3.4,0xFFD35C]]){
      add(new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,1.5,5), mat(0x8a8f9c)), px,.75,pz);
      add(new THREE.Mesh(new THREE.BoxGeometry(.55,.34,.04), mat(col)), px+.3,1.3,pz);
    }
    break; }
  }
}

WORLDS.forEach((w,i)=>{
  const ang=i/8*Math.PI*2;
  const cx=Math.cos(ang)*ISL_DIST, cz=Math.sin(ang)*ISL_DIST;
  const isl=makeIsland(ISL_R, ISLAND_GRASS[w.id]||0x86c968);
  isl.position.set(cx,0,cz); scene.add(isl);
  islands.push({cx,cz,r:ISL_R});

  /* 테마 장식 */
  decorateIsland(w,cx,cz,ang);

  /* 다리 */
  const dirx=Math.cos(ang), dirz=Math.sin(ang);
  const ax=dirx*(HUB_R-0.6), az=dirz*(HUB_R-0.6);
  const bx=cx-dirx*(ISL_R-0.6), bz=cz-dirz*(ISL_R-0.6);
  const len=Math.hypot(bx-ax,bz-az);
  const bridge=new THREE.Mesh(new THREE.BoxGeometry(2.4,.35,len+1.2), mat(0xC9924F));
  bridge.position.set((ax+bx)/2,-0.18,(az+bz)/2);
  bridge.rotation.y=Math.atan2(bx-ax,bz-az); scene.add(bridge);
  for(let s=0;s<=Math.floor(len/2.4);s++){
    const t=s/(Math.floor(len/2.4)||1);
    const px=ax+(bx-ax)*t, pz=az+(bz-az)*t;
    const postL=new THREE.Mesh(new THREE.BoxGeometry(.16,.9,.16), mat(0x8a5a2e));
    postL.position.set(px+dirz*1.1,.45,pz-dirx*1.1); scene.add(postL);
    const postR=postL.clone(); postR.position.set(px-dirz*1.1,.45,pz+dirx*1.1); scene.add(postR);
  }
  bridgeCorridors.push({ax,az,bx,bz});

  /* NPC 정령 */
  const npc=new THREE.Group();
  const body=new THREE.Mesh(new THREE.IcosahedronGeometry(0.85,0),
    new THREE.MeshLambertMaterial({color:w.color, emissive:w.color, emissiveIntensity:.45, flatShading:true}));
  npc.add(body);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(1.25,.08,6,20),
    new THREE.MeshLambertMaterial({color:0xffffff, emissive:0xffffff, emissiveIntensity:.3}));
  ring.rotation.x=Math.PI/2; npc.add(ring);
  const lbl=labelSprite(w.name, w.css); lbl.position.y=2.6; npc.add(lbl);
  npc.position.set(cx,2,cz);
  scene.add(npc);
  npcs.push({mesh:npc, body, ring, world:w, cx, cz});

  /* 별 비콘 */
  const beaconGrp=new THREE.Group();
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(.12,.15,3,6), mat(0x7a5236));
  pole.position.y=1.5; beaconGrp.add(pole);
  beaconGrp.position.set(cx-Math.cos(ang)*3.2, 0, cz-Math.sin(ang)*3.2);
  scene.add(beaconGrp);
  beacons.push({grp:beaconGrp, stars:[]});
});
function refreshBeacon(i){
  const b=beacons[i];
  b.stars.forEach(s=>b.grp.remove(s)); b.stars=[];
  const n=S.stars[WORLDS[i].id]||0;
  for(let k=0;k<n;k++){
    const st=new THREE.Mesh(new THREE.OctahedronGeometry(.34,0),
      new THREE.MeshLambertMaterial({color:0xFFD35C, emissive:0xFFD35C, emissiveIntensity:.6}));
    st.position.y=3.4+k*0.85; b.grp.add(st); b.stars.push(st);
  }
}
WORLDS.forEach((w,i)=>refreshBeacon(i));

const chests=[];
let chestTimer=14;
function buildChest(){
  const g=new THREE.Group();
  const woodM=mat(0x9a6a3c), goldM=emat(0xFFD35C,.35);
  const base=new THREE.Mesh(new THREE.BoxGeometry(.95,.55,.65), woodM); base.position.y=.28; g.add(base);
  const trim=new THREE.Mesh(new THREE.BoxGeometry(1,.1,.7), goldM); trim.position.y=.52; g.add(trim);
  const lock=new THREE.Mesh(new THREE.BoxGeometry(.16,.2,.08), goldM); lock.position.set(0,.42,.36); g.add(lock);
  const lidPiv=new THREE.Group(); lidPiv.position.set(0,.55,-.32);
  const lid=new THREE.Mesh(new THREE.BoxGeometry(.95,.28,.65), woodM); lid.position.set(0,.14,.32); lidPiv.add(lid);
  const lidTrim=new THREE.Mesh(new THREE.BoxGeometry(1,.08,.68), goldM); lidTrim.position.set(0,.28,.32); lidPiv.add(lidTrim);
  g.add(lidPiv);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.8,.06,5,16), emat(0xFFD35C,.7));
  ring.rotation.x=Math.PI/2; ring.position.y=.06; g.add(ring);
  const beam=new THREE.Mesh(new THREE.CylinderGeometry(.3,.5,6,8,1,true),
    new THREE.MeshBasicMaterial({color:0xFFE58A, transparent:true, opacity:.28, side:THREE.DoubleSide, fog:false}));
  beam.position.y=3; g.add(beam);
  return {g, lidPiv, ring, beam};
}
function spawnChest(){
  for(let tries=0;tries<10;tries++){
    let cx,cz,r;
    const pick=Math.floor(Math.random()*9);
    if(pick===8){ cx=0; cz=0; r=HUB_R-3; } else { cx=islands[pick].cx; cz=islands[pick].cz; r=ISL_R-2.6; }
    const [x,z]=rndOnIsland(cx,cz,r);
    if(Math.hypot(x-cx,z-cz)<2.6) continue;               /* NPC/구조물 중심 회피 */
    if(Math.hypot(x-SHOP_POS.x,z-SHOP_POS.z)<3.5) continue; /* 상점 회피 */
    if(!walkable(x,z)) continue;
    const c=buildChest();
    c.g.position.set(x,0,z); c.g.rotation.y=Math.random()*Math.PI*2;
    c.x=x; c.z=z; c.opened=false;
    scene.add(c.g); chests.push(c);
    return;
  }
}
function openChest(c){
  if(c.opened) return;
  c.opened=true; sfx.star();
  const r=Math.random();
  let dia = r<.5?5 : r<.8?10 : r<.95?20 : 50;
  if(isNight) dia=Math.round(dia*1.5);
  S.diamonds+=dia; save(); updateHud();
  toast('보물 발견! &#128142; +'+dia + (isNight?' (밤 보너스 1.5배!)':''));
  questProg('chest');
  /* 뚜껑 열림 + 반짝이 */
  const sparks=[];
  for(let k=0;k<6;k++){
    const sp=new THREE.Mesh(new THREE.OctahedronGeometry(.12,0), emat(0xFFD35C,.9));
    sp.position.set(c.x+(Math.random()-.5)*.6, .7, c.z+(Math.random()-.5)*.6);
    sp.userData.vy=1.8+Math.random()*1.4; scene.add(sp); sparks.push(sp);
  }
  const born=clock3.elapsedTime;
  animProps.push({fn:t=>{
    const e=t-born;
    c.lidPiv.rotation.x=Math.max(-1.7, -e*5);
    sparks.forEach(sp=>{ sp.position.y+=sp.userData.vy*0.016; sp.rotation.y+=.2; sp.scale.setScalar(Math.max(0,1-e*.8)); });
  }});
  setTimeout(()=>{
    scene.remove(c.g); sparks.forEach(sp=>scene.remove(sp));
    const i=chests.indexOf(c); if(i>=0) chests.splice(i,1);
  },1700);
}

/* ============================================================
   이동 판정 (섬 + 다리 위만 걷기 가능)
============================================================ */
function distToSeg(px,pz,ax,az,bx,bz){
  const dx=bx-ax,dz=bz-az; const L2=dx*dx+dz*dz;
  let t=((px-ax)*dx+(pz-az)*dz)/L2; t=Math.max(0,Math.min(1,t));
  const qx=ax+dx*t, qz=az+dz*t;
  return Math.hypot(px-qx,pz-qz);
}
function walkable(x,z){
  if(Math.hypot(x,z) < HUB_R-0.8) return true;
  for(const isl of islands) if(Math.hypot(x-isl.cx,z-isl.cz) < isl.r-0.8) return true;
  for(const b of bridgeCorridors) if(distToSeg(x,z,b.ax,b.az,b.bx,b.bz) < 1.05) return true;
  return false;
}

/* ============================================================
   조이스틱 + 키보드
============================================================ */
const joy={active:false,id:null,bx:0,by:0,vx:0,vy:0};
const joyZone=document.getElementById('joyZone'),
      joyBase=document.getElementById('joyBase'),
      joyKnob=document.getElementById('joyKnob');
function joyCenter(){
  const r=joyBase.getBoundingClientRect();
  joy.bx=r.left+r.width/2; joy.by=r.top+r.height/2;
  setKnob(0,0);
}
function setKnob(dx,dy){ joyKnob.style.left=(joy.bx+dx-29)+'px'; joyKnob.style.top=(joy.by+dy-29)+'px'; }
function joyShow(){ joyBase.style.display='block'; joyKnob.style.display='block'; joyCenter(); }
function joyStart(x,y,id){ joy.active=true; joy.id=id; joyMove(x,y); }
function joyMove(x,y){
  let dx=x-joy.bx, dy=y-joy.by;
  const d=Math.hypot(dx,dy), max=54;
  if(d>max){ dx*=max/d; dy*=max/d; }
  joy.vx=dx/max; joy.vy=dy/max;
  setKnob(dx,dy);
}
function joyEnd(){ joy.active=false; joy.vx=joy.vy=0; setKnob(0,0); }
joyZone.addEventListener('touchstart',e=>{ e.preventDefault(); const t=e.changedTouches[0]; joyStart(t.clientX,t.clientY,t.identifier); initAudio(); },{passive:false});
joyZone.addEventListener('touchmove',e=>{ e.preventDefault(); for(const t of e.changedTouches) if(t.identifier===joy.id) joyMove(t.clientX,t.clientY); },{passive:false});
joyZone.addEventListener('touchend',e=>{ for(const t of e.changedTouches) if(t.identifier===joy.id) joyEnd(); });
joyZone.addEventListener('touchcancel',joyEnd);
joyZone.addEventListener('mousedown',e=>{ joyStart(e.clientX,e.clientY,'m'); initAudio(); });
window.addEventListener('mousemove',e=>{ if(joy.active&&joy.id==='m') joyMove(e.clientX,e.clientY); });
window.addEventListener('mouseup',()=>{ if(joy.id==='m') joyEnd(); });
const keys={};
window.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true;
  if(e.key==='Enter'&&started&&!quizOpen&&!shopOpen&&!setOpen){ if(typeof interact==='function') interact(); } });
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

/* ============================================================
   메인 루프
============================================================ */
let nearNpc=null, nearShop=false, nearChest=null, quizOpen=false, shopOpen=false, setOpen=false, started=false, lastZone='';
const talkBtn=document.getElementById('talkBtn');
const clock3=new THREE.Clock();
let camAngle=0, stepAcc=0;

function resize(){
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  /* 세로 화면에서는 시야각을 넓혀 답답하지 않게 */
  camera.fov = camera.aspect<0.8 ? 72 : camera.aspect<1.1 ? 63 : 55;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',()=>{ resize(); joyCenter(); }); resize();
window.addEventListener('orientationchange',()=>{ setTimeout(()=>{ resize(); joyCenter(); },300); });

/* ============================================================
   전체화면 + 화면 꺼짐 방지
============================================================ */
function isFs(){ return !!(document.fullscreenElement||document.webkitFullscreenElement); }
function toggleFs(){
  initAudio(); sfx.click();
  try{
    if(isFs()){
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    } else {
      const el=document.documentElement;
      (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
    }
  }catch(e){ toast('이 기기에서는 전체화면을 지원하지 않아요'); }
}
function updateFsIcons(){
  const ic = isFs() ? '&#x2921;' : '&#x26F6;';
  const a=document.getElementById('fsIcon'); if(a) a.innerHTML=ic;
  const b=document.getElementById('fsStartBtn'); if(b) b.innerHTML=ic;
}
['fullscreenchange','webkitfullscreenchange'].forEach(ev=>

document.getElementById('fsChip').onclick=toggleFs;
document.getElementById('fsStartBtn').onclick=toggleFs;
let wakeLock=null;
async function requestWakeLock(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&started) requestWakeLock(); });

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock3.getDelta(), .05);
  const t=clock3.elapsedTime;

  /* 입력 벡터 */
  let ix=joy.vx, iz=joy.vy;
  if(keys['w']||keys['arrowup']) iz-=1;
  if(keys['s']||keys['arrowdown']) iz+=1;
  if(keys['a']||keys['arrowleft']) ix-=1;
  if(keys['d']||keys['arrowright']) ix+=1;
  const mag=Math.min(1,Math.hypot(ix,iz));

  if(started && !quizOpen && !shopOpen && !setOpen && mag>0.08){
    const sinA=Math.sin(camAngle), cosA=Math.cos(camAngle);
    const wx=(ix*cosA - iz*sinA), wz=(ix*sinA + iz*cosA);
    const spd=7.2*mag*dt;
    let nx=player.position.x+wx*spd, nz=player.position.z+wz*spd;
    if(walkable(nx,nz)){ player.position.x=nx; player.position.z=nz; }
    else if(walkable(nx,player.position.z)){ player.position.x=nx; }
    else if(walkable(player.position.x,nz)){ player.position.z=nz; }
    const heading=Math.atan2(wx,wz);
    let d=heading-player.rotation.y;
    while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2;
    player.rotation.y+=d*Math.min(1,dt*12);
    /* 걷기 애니메이션 */
    if(P){
      const sw=Math.sin(t*11)*0.6*mag;
      P.legL.rotation.x=sw; P.legR.rotation.x=-sw;
      P.armL.rotation.x=-sw*0.8; P.armR.rotation.x=sw*0.8;
    }
    player.position.y=WALK_Y+Math.abs(Math.sin(t*11))*0.07*mag;
    stepAcc+=dt; if(stepAcc>0.28){ stepAcc=0; sfx.step(); }
  } else {
    if(P){
      P.legL.rotation.x*=0.8; P.legR.rotation.x*=0.8;
      P.armL.rotation.x*=0.8; P.armR.rotation.x*=0.8;
      /* 서 있을 때 숨쉬기 */
      P.g.scale.y=1+Math.sin(t*2.2)*0.008;
    }
    player.position.y+= (WALK_Y-player.position.y)*0.3;
  }

  /* 카메라 팔로우 */
  const camDist=13, camH=8.5;
  const tx=player.position.x - Math.sin(camAngle)*camDist;
  const tz=player.position.z + Math.cos(camAngle)*camDist;
  camera.position.x += (tx-camera.position.x)*Math.min(1,dt*4);
  camera.position.z += (tz-camera.position.z)*Math.min(1,dt*4);
  camera.position.y += (player.position.y+camH-camera.position.y)*Math.min(1,dt*4);
  camera.lookAt(player.position.x, player.position.y+1.4, player.position.z);

  /* 밤낮 순환 */
  const cyc=(t/DAY_LEN)*Math.PI*2 + 0.6;
  dayF=Math.min(1,Math.max(0,Math.sin(cyc)*1.5+0.5));
  isNight = dayF<0.3;
  const sunsetF=Math.pow(1-Math.abs(dayF*2-1),3)*0.55;
  tmpC.copy(skyNightC).lerp(skyDayC,dayF).lerp(sunsetC,sunsetF);
  scene.background.copy(tmpC); scene.fog.color.copy(tmpC);
  hemi.intensity=.32+.63*dayF; sun.intensity=.15+.8*dayF;
  starMat.opacity=(1-dayF)*.9; moonMat.opacity=1-dayF;
  fireflies.forEach(f=>{
    const vis=dayF<0.45; f.m.visible=vis;
    if(vis){
      f.m.position.set(f.bx+Math.sin(t*.7+f.ph)*1.3, f.by+Math.sin(t*1.3+f.ph)*.5, f.bz+Math.cos(t*.6+f.ph)*1.3);
      f.m.material.emissiveIntensity=.6+Math.sin(t*4+f.ph)*.4;
    }
  });

  /* 보물상자 스폰 & 근접 */
  if(started && !quizOpen && !shopOpen && !setOpen){
    chestTimer-=dt;
    if(chestTimer<=0){ if(chests.length<2) spawnChest(); chestTimer=45+Math.random()*40; }
  }
  nearChest=null; let cd=2.9;
  chests.forEach(c=>{
    if(c.opened) return;
    c.ring.rotation.z=t*1.2;
    c.beam.material.opacity=.2+Math.sin(t*3)*.08;
    const d=Math.hypot(player.position.x-c.x, player.position.z-c.z);
    if(d<cd){ cd=d; nearChest=c; }
  });

  /* NPC 애니메이션 + 근접 판정 */
  nearNpc=null; let nd=4.2;
  npcs.forEach((n,i)=>{
    n.mesh.position.y=2+Math.sin(t*1.6+i)*0.28;
    n.body.rotation.y=t*0.8+i;
    n.ring.rotation.z=t*0.9;
    const d=Math.hypot(player.position.x-n.cx, player.position.z-n.cz);
    if(d<nd){ nd=d; nearNpc=n; }
  });
  const shopD=Math.hypot(player.position.x-SHOP_POS.x, player.position.z-SHOP_POS.z);
  nearShop = shopD<4.2 && shopD<nd;
  const uiOpen = quizOpen||shopOpen||setOpen;
  if(started && !uiOpen && (nearChest||nearNpc||nearShop)){
    const label = nearChest ? '보물상자 열기' : nearShop ? '상점 구경하기' : nearNpc.world.npc+'에게 말 걸기';
    if(talkBtn.style.display!=='flex' || document.getElementById('talkLabel').innerText!==label){
      document.getElementById('talkLabel').innerText=label;
      talkBtn.style.display='flex';
    }
  } else if(talkBtn.style.display!=='none') talkBtn.style.display='none';

  /* 동행 펫 팔로우 */
  if(companion){
    const back=1.7;
    const tx=player.position.x - Math.sin(player.rotation.y)*back + Math.cos(player.rotation.y)*0.9;
    const tz=player.position.z - Math.cos(player.rotation.y)*back - Math.sin(player.rotation.y)*0.9;
    const dx=tx-companion.position.x, dz=tz-companion.position.z;
    const dist=Math.hypot(dx,dz);
    if(dist>0.15){
      companion.position.x+=dx*Math.min(1,dt*4.5);
      companion.position.z+=dz*Math.min(1,dt*4.5);
      const h=Math.atan2(dx,dz);
      let dr=h-companion.rotation.y;
      while(dr>Math.PI)dr-=Math.PI*2; while(dr<-Math.PI)dr+=Math.PI*2;
      companion.rotation.y+=dr*Math.min(1,dt*8);
    }
    if(compParts.egg){
      companion.position.y=Math.abs(Math.sin(t*2.4))*0.12;
      companion.rotation.z=Math.sin(t*3)*0.12;
    } else if(compParts.wings){
      companion.position.y=0.45+Math.sin(t*3)*0.18; /* 드래곤은 떠다님 */
      compParts.wings.forEach(w=>{ w.piv.rotation.z=w.sx*(0.35+Math.sin(t*9)*0.45); });
      if(compParts.tail) compParts.tail.rotation.y=Math.sin(t*4)*0.2;
    } else {
      companion.position.y = dist>0.3 ? Math.abs(Math.sin(t*9))*0.1 : 0;
      if(compParts.tail) compParts.tail.rotation.y=Math.sin(t*7)*0.35;
    }
  }

  /* 테마 소품 애니메이션 */
  animProps.forEach(p=>p.fn(t));
  cosmeticAnims.forEach(f=>f(t));

  /* 지역 배너 */
  if(started){
    let zone='별빛 광장';
    for(let i=0;i<islands.length;i++)
      if(Math.hypot(player.position.x-islands[i].cx, player.position.z-islands[i].cz)<islands[i].r) zone=WORLDS[i].name;
    if(zone!==lastZone){
      lastZone=zone;
      const zb=document.getElementById('zoneBanner');
      zb.innerText=zone; zb.classList.add('show');
      setTimeout(()=>zb.classList.remove('show'),1800);
    }
  }

  /* 별 비콘 반짝 */
  beacons.forEach(b=>b.stars.forEach((s,k)=>{ s.rotation.y=t*2+k; s.position.x=Math.sin(t*1.4+k)*0.12; }));
  /* 태양이 플레이어를 따라다녀 그림자가 항상 선명하게 */
  if(GFX_SOFT && player){
    sun.position.set(player.position.x+26, 44, player.position.z+16);
    sun.target.position.copy(player.position);
  }
  /* 구름 이동 */
  clouds.forEach(c=>{ c.position.x+=c.userData.speed*dt; if(c.position.x>110) c.position.x=-110; });

  renderer.render(scene,camera);
}
animate();
</script>
<script>
/* ============================================================
   퀴즈 엔진 (월드별 문제 생성기 - 원본 로직 이식)
============================================================ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
/* 카드 덱: 데이터를 전부 한 바퀴 돌 때까지 같은 문제가 다시 나오지 않음 */
const DECKS={};
function drawFrom(key, arr){
  let d=DECKS[key];
  if(!d || !d.length || d._n!==arr.length){
    d=DECKS[key]=shuffle(arr.map((_,i)=>i));
    d._n=arr.length;
  }
  return arr[d.pop()];
}
function numOpts(ans, spread, unit='', step=1){
  const set=new Set([ans]);
  const maxK=Math.max(1, Math.floor(spread/step));
  let guard=0;
  while(set.size<4 && guard++<200){
    const k=Math.floor(Math.random()*maxK*2)-maxK; /* -maxK ~ +maxK */
    const v=ans + k*step;
    if(v>0 && v!==ans) set.add(v);
  }
  /* 보험: step으로 4개를 못 채우면 1단위로 채움 */
  while(set.size<4){
    const v=ans + (Math.floor(Math.random()*spread*2)-spread);
    if(v>0 && v!==ans) set.add(v);
  }
  const arr=shuffle([...set]);
  return { options:arr.map(v=>v+unit), answerIndex:arr.indexOf(ans) };
}
function clockSVG(h,m){
  const hAng=((h%12)+m/60)*30, mAng=m*6;
  let ticks='';
  for(let i=0;i<12;i++){ const a=i*30*Math.PI/180;
    ticks+=`<line x1="${90+Math.sin(a)*70}" y1="${90-Math.cos(a)*70}" x2="${90+Math.sin(a)*78}" y2="${90-Math.cos(a)*78}" stroke="#243044" stroke-width="${i%3===0?5:2.5}" stroke-linecap="round"/>`;
  }
  return `<svg class="clockFace" viewBox="0 0 180 180">
    <circle cx="90" cy="90" r="84" fill="#fff" stroke="#243044" stroke-width="6"/>${ticks}
    <line x1="90" y1="90" x2="${90+Math.sin(hAng*Math.PI/180)*40}" y2="${90-Math.cos(hAng*Math.PI/180)*40}" stroke="#243044" stroke-width="8" stroke-linecap="round"/>
    <line x1="90" y1="90" x2="${90+Math.sin(mAng*Math.PI/180)*62}" y2="${90-Math.cos(mAng*Math.PI/180)*62}" stroke="#E25555" stroke-width="5" stroke-linecap="round"/>
    <circle cx="90" cy="90" r="6" fill="#243044"/></svg>`;
}
function fracSVG(num,den,color){
  let paths='';
  for(let i=0;i<den;i++){
    const a0=(i/den)*Math.PI*2-Math.PI/2, a1=((i+1)/den)*Math.PI*2-Math.PI/2;
    const x0=75+Math.cos(a0)*66, y0=75+Math.sin(a0)*66, x1=75+Math.cos(a1)*66, y1=75+Math.sin(a1)*66;
    paths+=`<path d="M75,75 L${x0},${y0} A66,66 0 0 1 ${x1},${y1} Z" fill="${i<num?color:'#EDF1F8'}" stroke="#fff" stroke-width="3"/>`;
  }
  return `<svg class="fracSvg" viewBox="0 0 150 150">${paths}<circle cx="75" cy="75" r="66" fill="none" stroke="#243044" stroke-width="4"/></svg>`;
}
/* 월드별 학습 레벨 정의 */
const LEVELS={
  dungeon:[
    {label:'2단',p:2},{label:'3단',p:3},{label:'4단',p:4},{label:'5단',p:5},
    {label:'6단',p:6},{label:'7단',p:7},{label:'8단',p:8},{label:'9단',p:9},
    {label:'전체 랜덤',p:0}
  ],
  village:[
    {label:'1단계 &#183; 기초 (5문제)',p:1},
    {label:'2단계 &#183; 도전 (7문제, 하트 2개)',p:2}
  ],
  castle:[
    {label:'행맨 &#183; 듣고 스펠링 맞추기',p:'hangman'},
    {label:'1단계 &#183; 뜻 보고 영어 고르기',p:1},
    {label:'2단계 &#183; 영어 보고 뜻 고르기',p:2},
    {label:'3단계 &#183; 섞어서',p:3}
  ],
  clock:[
    {label:'1단계 &#183; 정시와 30분',p:1},
    {label:'2단계 &#183; 10분 단위',p:2},
    {label:'3단계 &#183; 5분 단위',p:3}
  ],
  market:[
    {label:'1단계 &#183; 물건 1개 값',p:1},

    {label:'3단계 &#183; 거스름돈',p:3}
  ],
  calc:[
    {label:'1단계 &#183; 한 자리 덧셈',p:'very_easy'},
    {label:'2단계 &#183; 한 자리 더하기 빼기',p:'easy'},
    {label:'3단계 &#183; 두 자리 더하기 빼기',p:'normal'}
  ],
  fraction:[
    {label:'1단계 &#183; 분모 2~4',p:1},

  ],
  capital:[

  ]
};
const GEN={
  dungeon(p){ /* 구구단: p=단수, 0이면 랜덤 */
    const a=p||Math.floor(Math.random()*8)+2, b=Math.floor(Math.random()*9)+1, ans=a*b;
    return { prompt:`${a} × ${b} = ?`, ...numOpts(ans, Math.max(6,Math.floor(ans*0.3))) };
  },
  village(){ /* 받아쓰기 (난이도는 문제 수/하트로 조절) */
    const q=drawFrom('village', SPELLING_DATA);
    const opts=shuffle([q.correct, ...q.wrongs.slice(0,1)]);
    return { prompt:q.sentence.replace('___','<span style="color:#5A8DEE">___</span>'),
      options:opts, answerIndex:opts.indexOf(q.correct), twoCol:true };
  },
  castle(p){ /* 영어: 1 뜻→영어, 2 영어→뜻, 3 랜덤 */
    const q=drawFrom('castle', ENGLISH_DATA);
    const mode = p===3 ? (Math.random()<0.5?1:2) : (p||1);
    if(mode===1){
      const set=new Set([q.word]);
      while(set.size<4) set.add(ENGLISH_DATA[Math.floor(Math.random()*ENGLISH_DATA.length)].word);
      const opts=shuffle([...set]);
      return { prompt:`'${q.mean}' 은(는) 영어로?`, options:opts, answerIndex:opts.indexOf(q.word), speak:q.word };
    } else {
      const set=new Set([q.mean]);
      while(set.size<4) set.add(ENGLISH_DATA[Math.floor(Math.random()*ENGLISH_DATA.length)].mean);
      const opts=shuffle([...set]);
      return { prompt:`<span style="color:#5A8DEE">${q.word}</span> 의 뜻은?`, options:opts, answerIndex:opts.indexOf(q.mean), speak:q.word };
    }
  },
  clock(p){ /* 시계: 분 단위 레벨 */
    const pools={1:[0,30], 2:[0,10,20,30,40,50], 3:[0,5,10,15,20,25,30,35,40,45,50,55]};
    const pool=pools[p]||pools[1];
    const h=Math.floor(Math.random()*12)+1;
    const m=pool[Math.floor(Math.random()*pool.length)];
    const ansTxt=m===0?`${h}시`:`${h}시 ${m}분`;
    const set=new Set([ansTxt]);
    while(set.size<4){
      const hh=Math.floor(Math.random()*12)+1, mm=pool[Math.floor(Math.random()*pool.length)];
      set.add(mm===0?`${hh}시`:`${hh}시 ${mm}분`);
    }
    const opts=shuffle([...set]);
    return { prompt:'지금 몇 시일까요?', visual:clockSVG(h,m), options:opts, answerIndex:opts.indexOf(ansTxt) };
  },
  market(p){ /* 시장: 1 물건1개, 2 물건2개, 3 거스름돈 */
    if(p!==3){
      const count = p===2?2:1;
      const chosen=shuffle(MARKET_ITEMS).slice(0,count);
      const total=chosen.reduce((s,i)=>s+i.price,0);
      const vis=chosen.map(i=>`<span style="font-size:44px">${i.icon}</span><span style="font-size:17px;color:#6B7A99"> ${i.price}원 </span>`).join(' ');
      return { prompt:'모두 얼마일까요?', visual:`<div>${vis}</div>`, ...numOpts(total,400,'원',100) };
    } else {
      const item=shuffle(MARKET_ITEMS.filter(i=>i.price<=1000))[0];
      const payOptions=[1000,2000,5000].filter(p=>p>item.price);
      const pay=payOptions[Math.floor(Math.random()*payOptions.length)];
      const change=pay-item.price;
      return { prompt:`${item.name}(${item.price}원)를 사고 <b>${pay}원</b>을 냈어요.<br>거스름돈은?`,
        visual:`<span style="font-size:48px">${item.icon}</span>`, ...numOpts(change,500,'원',100) };
    }
  },
  calc(p){ /* 연산 (원본 genCalcQ 이식, p=난이도) */
    let a,b,op,ans;
    if(p==='very_easy'){ a=Math.floor(Math.random()*5)+1; b=Math.floor(Math.random()*5)+1; op='+'; ans=a+b; }
    else if(p==='easy'){ op=Math.random()<0.5?'+':'-';
      if(op==='+'){ a=Math.floor(Math.random()*9)+1; b=Math.floor(Math.random()*(9-a+1)); ans=a+b; }
      else { a=Math.floor(Math.random()*9)+1; b=Math.floor(Math.random()*(a+1)); ans=a-b; } }
    else { op=Math.random()<0.5?'+':'-';
      if(op==='+'){ a=Math.floor(Math.random()*90)+10; b=Math.floor(Math.random()*90)+10; ans=a+b; }
      else { a=Math.floor(Math.random()*90)+10; b=Math.floor(Math.random()*a)+1; ans=a-b; } }
    return { prompt:`${a} ${op} ${b} = ?`, ...numOpts(ans, Math.max(5,Math.floor((ans||1)*0.4))) };
  },
  fraction(p){ /* 분수: 분모 범위 레벨 */
    const dens = p===2 ? [5,6,8] : [2,3,4];
    const den=dens[Math.floor(Math.random()*dens.length)];
    const num=Math.floor(Math.random()*(den-1))+1;
    const ansTxt=`${num}/${den}`;
    const set=new Set([ansTxt]);
    while(set.size<4){
      const d2=dens[Math.floor(Math.random()*dens.length)];
      const n2=Math.floor(Math.random()*(d2-1))+1;
      set.add(`${n2}/${d2}`);
    }
    const opts=shuffle([...set]);
    return { prompt:'색칠된 부분은 전체의 얼마일까요?', visual:fracSVG(num,den,'#39C6C0'),
      options:opts, answerIndex:opts.indexOf(ansTxt) };
  },
  capital(p){ /* 세계 수도: 1 유명 국가, 2 전체 52개국 */
    const pool = p===1 ? CAPITAL_DATA.slice(0,12) : CAPITAL_DATA;
    const q=drawFrom('capital'+(p===1?'1':'2'), pool);
    const set=new Set([q.capital]);
    while(set.size<4) set.add(pool[Math.floor(Math.random()*pool.length)].capital);
    const opts=shuffle([...set]);
    return { prompt:`<span style="font-size:44px">${q.flag}</span><br>${q.country}의 수도는?`,
      options:opts, answerIndex:opts.indexOf(q.capital) };
  }
};

const HG_MAX=6;
function hangmanSVG(miss){
  const p=[
    '<circle cx="120" cy="52" r="14" fill="none" stroke="#243044" stroke-width="5"/>',                /* 머리 */
    '<line x1="120" y1="66" x2="120" y2="104" stroke="#243044" stroke-width="5" stroke-linecap="round"/>', /* 몸 */
    '<line x1="120" y1="76" x2="100" y2="94" stroke="#243044" stroke-width="5" stroke-linecap="round"/>',  /* 왼팔 */
    '<line x1="120" y1="76" x2="140" y2="94" stroke="#243044" stroke-width="5" stroke-linecap="round"/>',  /* 오른팔 */
    '<line x1="120" y1="104" x2="103" y2="128" stroke="#243044" stroke-width="5" stroke-linecap="round"/>',/* 왼다리 */
    '<line x1="120" y1="104" x2="137" y2="128" stroke="#243044" stroke-width="5" stroke-linecap="round"/>' /* 오른다리 */
  ];
  return `<svg viewBox="0 0 170 150" style="width:130px;height:116px;">
    <line x1="20" y1="140" x2="90" y2="140" stroke="#8A6248" stroke-width="7" stroke-linecap="round"/>
    <line x1="45" y1="140" x2="45" y2="16" stroke="#8A6248" stroke-width="7" stroke-linecap="round"/>
    <line x1="42" y1="18" x2="120" y2="18" stroke="#8A6248" stroke-width="7" stroke-linecap="round"/>
    <line x1="120" y1="18" x2="120" y2="38" stroke="#8A6248" stroke-width="5"/>
    ${p.slice(0,miss).join('')}
  </svg>`;
}
let H=null;
function renderHangman(){
  const q=drawFrom('hangman', ENGLISH_DATA);
  H={word:q.word.toUpperCase(), mean:q.mean, guessed:new Set(), miss:0, done:false};
  document.getElementById('quizVisual').innerHTML=
    `<div id="hgFig">${hangmanSVG(0)}</div>
     <button id="hgSpeak">&#128266; 다시 듣기</button>
     <div class="hgHint">힌트: ${H.mean}</div>`;
  document.getElementById('quizPrompt').innerHTML='<div id="hgBlanks"></div>';
  const box=document.getElementById('quizOpts');
  box.style.gridTemplateColumns='1fr';
  box.innerHTML='<div id="hgKeys"></div>';
  const keys=document.getElementById('hgKeys');
  for(let i=0;i<26;i++){
    const ch=String.fromCharCode(65+i);
    const b=document.createElement('button');
    b.className='hgKey'; b.innerText=ch;
    b.onclick=()=>hgPick(ch,b);
    keys.appendChild(b);
  }
  hgDrawBlanks();
  document.getElementById('hgSpeak').onclick=()=>{ sfx.click(); speakEn(H.word); };
  speakEn(H.word);
}
function hgDrawBlanks(){
  const el=document.getElementById('hgBlanks');
  el.innerHTML='';
  for(const ch of H.word){
    const s=document.createElement('div');
    s.className='hgSlot'+(H.guessed.has(ch)?' hit':'');
    s.innerText=H.guessed.has(ch)?ch:'';
    el.appendChild(s);
  }
}
function hgPick(ch,btn){
  if(H.done||H.guessed.has(ch)||btn.disabled) return;
  btn.disabled=true;
  if(H.word.includes(ch)){
    H.guessed.add(ch); btn.classList.add('hit');
    tone(720,.08,'triangle',.06);
    hgDrawBlanks();
    if([...H.word].every(c=>H.guessed.has(c))){
      H.done=true; sfx.correct();
      recStat('castle', true);
      Q.correct++; Q.dia+=3; Q.xp+=3; S.diamonds+=3; addXp(3); save();
      Q.combo=(Q.combo||0)+1;
      juiceCorrect(document.getElementById('hgBlanks'), Q.combo);
      questProg('ans');
      speakEn(H.word);
      showAnswerFx(true, '정답!', H.word.toLowerCase()+' = '+H.mean);
      setTimeout(()=>{ Q.idx++; nextQ(); }, 1400);
    }
  } else {
    H.miss++; btn.classList.add('miss'); sfx.wrong();
    document.getElementById('hgFig').innerHTML=hangmanSVG(H.miss);
    if(H.miss>=HG_MAX){
      H.done=true; Q.lives--;
      recStat('castle', false);
      const set=new Set([H.word.toLowerCase()]);
      while(set.size<4) set.add(ENGLISH_DATA[Math.floor(Math.random()*ENGLISH_DATA.length)].word);
      const opts=shuffle([...set]);
      addWrong('castle', {prompt:`'${H.mean}' 은(는) 영어로?`, options:opts, answerIndex:opts.indexOf(H.word.toLowerCase())});
      H.word.split('').forEach(c=>H.guessed.add(c));
      hgDrawBlanks();
      speakEn(H.word);
      showAnswerFx(false, '아쉬워요!', '정답은 <b style="color:#243044;">'+H.word.toLowerCase()+'</b> ('+H.mean+')');
      setTimeout(()=>{ Q.idx++; nextQ(); }, 1800);
    }
  }
}

/* ---------- 정답 연출 ---------- */
function juiceCorrect(el, combo){
  try{
    const r=el.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    /* 별가루 파티클 */
    const glyphs=['&#11088;','&#10024;','&#128171;'];
    for(let i=0;i<7;i++){
      const sp=document.createElement('div');
      sp.className='spark';
      sp.innerHTML=glyphs[i%3];
      const a=Math.random()*Math.PI*2, d=50+Math.random()*70;
      sp.style.left=cx+'px'; sp.style.top=cy+'px';
      sp.style.setProperty('--dx', Math.cos(a)*d+'px');
      sp.style.setProperty('--dy', Math.sin(a)*d-30+'px');
      document.body.appendChild(sp);
      setTimeout(()=>sp.remove(),750);
    }
    /* 다이아 비행 -> HUD */
    const dia=document.createElement('div');
    dia.className='flyDia'; dia.innerHTML='&#128142;';
    dia.style.left=cx+'px'; dia.style.top=cy+'px';
    document.body.appendChild(dia);
    const chip=document.getElementById('hDia');
    const cr=chip.getBoundingClientRect();
    requestAnimationFrame(()=>{
      dia.style.left=(cr.left+cr.width/2)+'px';
      dia.style.top=(cr.top+cr.height/2)+'px';
      dia.style.opacity='0';
      dia.style.transform='scale(.4)';
    });
    setTimeout(()=>{
      dia.remove();
      chip.parentElement.classList.remove('chipPulse'); void chip.parentElement.offsetWidth;
      chip.parentElement.classList.add('chipPulse');
    },660);
    /* 콤보 배지 */
    if(combo>=2){
      const cb=document.getElementById('comboBadge');
      cb.innerHTML='&#128293; '+combo+'연속 정답!';
      cb.style.display='block';
      cb.style.animation='none'; void cb.offsetWidth;
      cb.style.animation='';
      if(combo>=3) tone(880+combo*60,.1,'triangle',.06);
    }
  }catch(e){}
}
function recStat(w, ok){
  const s=S.stats[w]||(S.stats[w]={a:0,c:0});
  s.a++; if(ok) s.c++; save();
}
function addWrong(w, cur){
  const q={prompt:cur.prompt, options:cur.options, answerIndex:cur.answerIndex};
  if(cur.visual) q.visual=cur.visual;
  S.wrongs.push({w, q});
  if(S.wrongs.length>30) S.wrongs.shift();
  save();
}
function pick(i,btn){
  if(Q.locked) return; Q.locked=true;
  const ok = i===Q.cur.answerIndex;
  if(Q.review){
    if(ok && Q.queue){ const wi=S.wrongs.indexOf(Q.queue[Q.idx]); if(wi>=0){ S.wrongs.splice(wi,1); save(); } }
  } else {
    recStat(Q.world.id, ok);
    if(!ok) addWrong(Q.world.id, Q.cur);
  }
  if(ok){
    btn.classList.add('correct'); sfx.correct();
    Q.correct++; Q.dia+=2; Q.xp+=2; S.diamonds+=2; addXp(2); save();
    Q.combo=(Q.combo||0)+1;
    juiceCorrect(btn, Q.combo);
    if(!Q.review) questProg('ans');
    if(Q.cur.speak && 'speechSynthesis' in window){
      try{ const u=new SpeechSynthesisUtterance(Q.cur.speak); u.lang='en-US'; u.rate=.9; speechSynthesis.speak(u); }catch(e){}
    }
    setTimeout(()=>{ Q.idx++; nextQ(); }, 750);
  } else {
    btn.classList.add('wrong'); sfx.wrong(); Q.lives--;
    Q.combo=0;
    document.getElementById('comboBadge').style.display='none';
    document.querySelectorAll('#quizOpts .opt').forEach((b,k)=>{ if(k===Q.cur.answerIndex) b.classList.add('correct'); });
    setTimeout(()=>{ Q.idx++; nextQ(); }, 1100);
  }
}

function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const ATT_REWARDS=[10,15,20,25,30,40,60];
function checkAttendance(){
  if(!S.att) S.att={last:'',streak:0};
  const today=todayStr();
  if(S.att.last===today) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const yStr=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
  S.att.streak = (S.att.last===yStr) ? S.att.streak+1 : 1;
  S.att.last=today;
  const day=((S.att.streak-1)%7)+1;
  const reward=ATT_REWARDS[day-1];
  S.diamonds+=reward; save(); updateHud();
  /* 출석 카드 표시 */
  setOpen=true; joyEnd();
  document.getElementById('attDay').innerText='연속 '+S.att.streak+'일째 출석 중!';
  const dots=document.getElementById('attDots'); dots.innerHTML='';
  for(let k=1;k<=7;k++){
    const dd=document.createElement('div');
    dd.className='attDot'+(k<day?' on':k===day?' today':'');
    dd.innerHTML = k<=day ? '&#11088;' : k+'일';
    dots.appendChild(dd);
  }
  document.getElementById('attReward').innerHTML='&#128142; +'+reward;
  document.getElementById('attOverlay').style.display='flex';
  sfx.star();
}

    S.dq={ date:todayStr(), list:[
      {id:'ans',   label:'문제 15개 맞히기',        goal:15, cur:0, done:false, reward:20},
      {id:'clear', label:w.name+' 클리어하기',      goal:1,  cur:0, done:false, reward:25, world:w.id},
      {id:'chest', label:'보물상자 1개 열기',       goal:1,  cur:0, done:false, reward:15}
    ]};

function updateQuestChip(){
  const el=document.getElementById('hQuestN');
  if(!el || !S.dq) return;
  const done=S.dq.list.filter(q=>q.done).length;
  el.innerText=done+'/'+S.dq.list.length;

function questProg(kind, worldId){
  if(!started) return;
  ensureQuests();
  S.dq.list.forEach(q=>{
    if(q.done) return;
    if((q.id==='ans'&&kind==='ans') || (q.id==='chest'&&kind==='chest') ||
       (q.id==='clear'&&kind==='clear'&&q.world===worldId)) q.cur++;
    if(q.cur>=q.goal){
      q.done=true;
      S.diamonds+=q.reward;
      updateHud();
      toast('퀘스트 완료! '+q.label+' &#128142;+'+q.reward);
      sfx.star();
    }

/* ============================================================

============================================================ */
const dlgEl=document.getElementById('dlgOverlay');
let dlgCb=null;
function askDialog(msg, opts, cb){
  document.getElementById('dlgMsg').innerHTML=msg;
  const inp=document.getElementById('dlgInput');
  inp.style.display = opts.input ? 'block' : 'none';
  inp.value='';
  dlgCb=cb;
  dlgEl.style.display='flex';
  if(opts.input) setTimeout(()=>inp.focus(),80);
}
document.getElementById('dlgOk').onclick=()=>{
  const v=document.getElementById('dlgInput').value;
  dlgEl.style.display='none';
  if(dlgCb){ const cb=dlgCb; dlgCb=null; cb(v); }
};
document.getElementById('dlgCancel').onclick=()=>{ dlgEl.style.display='none'; dlgCb=null; };
document.getElementById('dlgInput').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('dlgOk').click(); });
function askConfirm(msg, cb){ askDialog(msg, {input:false}, ()=>cb()); }

/* ============================================================
   보호자 관리 모드 (숨김: 버전 문구 5회 연속 탭 + 산수 확인)
============================================================ */
const admOverlayEl=document.getElementById('admOverlay');
let admTap=0, admTapTimer=null;
function admTapCount(){
  admTap++;
  clearTimeout(admTapTimer);
  admTapTimer=setTimeout(()=>{ admTap=0; },4000);
  if(admTap>=5){ admTap=0; parentGate(openAdmin); }
}
function parentGate(cb){
  const a=Math.floor(Math.random()*8)+12, b=Math.floor(Math.random()*6)+4;
  askDialog('&#128737;&#65039; 보호자 확인<br><b style="font-size:24px;">'+a+' × '+b+' = ?</b>', {input:true}, v=>{
    if(parseInt(v,10)===a*b) cb();
    else toast('보호자 확인에 실패했어요');
  });
}
document.getElementById('verTag').onclick=admTapCount;
function openAdmin(){
  setOpen=true; joyEnd();

}
function closeAdmin(){ admOverlayEl.style.display='none'; setOpen=false; }
document.getElementById('admClose').onclick=()=>{ sfx.click(); closeAdmin(); };
function admApplyView(ti){

}

      <button class="sBtn" id="admDiaSet">적용</button>
      <button class="sBtn" id="admDia100">+100</button>
    </div>
    <div class="shopRow">
      <div class="ic">&#127775;</div>
      <div class="info"><div class="nm">레벨 ${p.level}</div><div class="ds">적용 시 XP는 0부터</div></div>
      <input id="admLv" type="number" min="1" max="99" value="${p.level}"

      <button class="sBtn" id="admLvSet">적용</button>

function syncProfilesUI(){ syncTitleInputs(); renderProfiles(); }
function renderProfiles(){
  const row=document.getElementById('profRow');
  row.innerHTML='';
  ROOT.profiles.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='profCard'+(i===ROOT.active?' sel':'');
    const img=document.createElement('img'); img.src=PREVIEWS[p.charIdx||0]||'';
    const pn=document.createElement('div'); pn.className='pn'; pn.innerText=p.name||('프로필 '+(i+1));
    const pi=document.createElement('div'); pi.className='pi';
    const st=Object.values(p.stars||{}).reduce((a,b)=>a+b,0);
    pi.innerHTML='Lv.'+(p.level||1)+' &#183; &#11088;'+st;
    card.appendChild(img); card.appendChild(pn); card.appendChild(pi);
    if(ROOT.profiles.length>1){
      const px=document.createElement('button'); px.className='px'; px.innerHTML='&#10005;';
      px.onclick=(e)=>{
        e.stopPropagation();
        askConfirm('"'+(p.name||'프로필 '+(i+1))+'" 프로필을 삭제할까요?<br><span style="font-size:14px;color:#a83030;">모든 진행이 사라지고 되돌릴 수 없어요.</span>', ()=>{
          ROOT.profiles.splice(i,1);
          if(ROOT.active>=ROOT.profiles.length) ROOT.active=0;
          S=normalizeProfile(ROOT.profiles[ROOT.active]); save();
          syncProfilesUI();
        });
      };
      card.appendChild(px);
    }
    card.onclick=()=>{ initAudio(); sfx.click(); switchProfile(i); };
    row.appendChild(card);
  });
  if(ROOT.profiles.length<MAX_PROFILES){
    const add=document.createElement('div');
    add.className='profCard new'; add.innerHTML='+';
    add.onclick=()=>{
      initAudio(); sfx.click();
      ROOT.profiles.push(defaultProfile());
      switchProfile(ROOT.profiles.length-1);
      document.getElementById('nameInput').focus();
    };
    row.appendChild(add);
  }
}
function switchProfile(i){
  ROOT.profiles[ROOT.active]=S;
  ROOT.active=i;
  S=normalizeProfile(ROOT.profiles[i]);
  save();
  syncProfilesUI();
}

/* ---------- 게임 중 빠른 전환 (HUD 이름 칩) ---------- */
const profOverlayEl=document.getElementById('profOverlay');

  sfx.click(); setOpen=true; joyEnd();

}

function renderProfSwitch(){
  const list=document.getElementById('profList');
  list.innerHTML='';
  ROOT.profiles.forEach((p,i)=>{
    const cur = i===ROOT.active;
    const st=Object.values(p.stars||{}).reduce((a,b)=>a+b,0);
    const row=document.createElement('div'); row.className='shopRow';
    if(cur) row.style.cssText+='background:#FFF7E0;border:2px solid var(--gold);';

      <div class="ds">Lv.${p.level||1} &#183; &#11088; ${st} &#183; &#128142; ${p.diamonds||0}</div></div>`;

  });
  if(ROOT.profiles.length<MAX_PROFILES){
    const add=document.createElement('button'); add.className='sBtn';
    add.style.cssText='width:100%;margin-top:2px;';
    add.innerHTML='+ 새 프로필 만들기';
    add.onclick=()=>{
      sfx.click();
      ROOT.profiles.push(defaultProfile());
      switchProfile(ROOT.profiles.length-1);
      closeProfSwitch(); backToTitle();
      toast('새 프로필의 이름과 캐릭터를 정해 주세요');
    };

  }
  const manage=document.createElement('button'); manage.className='sBtn';
  manage.style.cssText='width:100%;margin-top:8px;background:#EDF1F8;color:var(--sub);box-shadow:0 3px 0 #cfd7e6;';
  manage.innerHTML='프로필 관리 (시작 화면으로)';
  manage.onclick=()=>{ sfx.click(); closeProfSwitch(); backToTitle(); };
  list.appendChild(manage);
}
function applyProfile(i){
  sfx.click();
  if(i===ROOT.active){ closeProfSwitch(); return; }
  switchProfile(i);
  closeProfSwitch();
  if(!S.name){ backToTitle(); toast('이 프로필의 이름과 캐릭터를 정해 주세요'); return; }
  /* 게임 중 즉시 적용 */
  setPlayerChar(S.charIdx||0, S.name);
  setCompanion();
  WORLDS.forEach((w,k)=>refreshBeacon(k));
  document.getElementById('hName').innerText=S.name;
  updateHud(); ensureQuests();
  toast(S.name+'(으)로 전환했어요!');
  setTimeout(checkAttendance, 500);
}

document.getElementById('setClose').onclick=()=>{ sfx.click(); closeSettings(); };
document.getElementById('setChip').onclick=()=>{ if(started) openSettings(); };
